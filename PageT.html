<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PageT - Metal Orders</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f4f6f8;
}

h1 {
    margin-top: 20px;
}

input, select, button {
    padding: 10px;
    margin: 8px;
    font-size: 14px;
}

table {
    border-collapse: collapse;
    width: 70%;
    margin: 20px auto;
    background: white;
}

th {
    background: #333;
    color: white;
    padding: 10px;
}

td {
    border: 1px solid #ccc;
    padding: 10px;
}
</style>
</head>

<body>

<h1>PageT — Metal Order System (API)</h1>

<a href="page3.html"><button>Back to Page 3</button></a>

<br>

<!-- INPUT SECTION -->
<select id="metal">
    <option value="gold">Gold</option>
    <option value="silver">Silver</option>
    <option value="platinum">Platinum</option>
    <option value="palladium">Palladium</option>
</select>

<input type="number" id="quantity" placeholder="Enter quantity">

<button onclick="createOrder()">Create Order</button>

<!-- TABLE -->
<table>
<thead>
<tr>
    <th>Metal</th>
    <th>Price (USD)</th>
    <th>Quantity</th>
    <th>Total</th>
    <th>Order ID</th>
</tr>
</thead>

<tbody id="output"></tbody>
</table>

<script>

async function createOrder(){

    const metal = document.getElementById("metal").value;
    const quantity = parseFloat(document.getElementById("quantity").value);

    if(!quantity || quantity <= 0){
        alert("Please enter a valid quantity");
        return;
    }

    try{

        // ✅ MetalpriceAPI request
        const res = await fetch("https://api.metalpriceapi.com/v1/latest?api_key=636bd01c9b6f77fcfba389cad1148a30&base=USD&currencies=XAU,XAG,XPT,XPD");
        const apiData = await res.json();

        console.log("API Data:", apiData);

        const rates = apiData.rates;

        // map dropdown → API codes
        const metalMap = {
            gold: "XAU",
            silver: "XAG",
            platinum: "XPT",
            palladium: "XPD"
        };

        const code = metalMap[metal];
        const price = rates[code];

        if(!price){
            alert("Metal not found in API");
            return;
        }

        // calculate total
        const total = (price * quantity).toFixed(2);

        // random Order ID
        const orderID = Math.floor(100000 + Math.random() * 900000);

        // add to table
        const tbody = document.getElementById("output");

        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td>${metal}</td>
            <td>${price}</td>
            <td>${quantity}</td>
            <td>${total}</td>
            <td>${orderID}</td>
        `;

        tbody.appendChild(tr);

    }
    catch(err){
        console.error(err);
        alert("API failed - check console (F12)");
    }
}

</script>

</body>
</html>

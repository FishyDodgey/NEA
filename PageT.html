<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PageT - Metal Orders</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f4f6f8;
}

input, select, button {
    padding: 10px;
    margin: 8px;
    font-size: 14px;
}

table {
    border-collapse: collapse;
    width: 85%;
    margin: 20px auto;
    background: white;
}

th {
    background: #333;
    color: white;
    padding: 10px;
}

td {
    border: 1px solid #ccc;
    padding: 10px;
}
</style>
</head>

<body>

<h1>PageT — Business Metal Orders</h1>

<br>

<select id="metal">
    <option value="gold">Gold</option>
    <option value="silver">Silver</option>
    <option value="platinum">Platinum</option>
    <option value="palladium">Palladium</option>
    <option value="copper">Copper</option>
    <option value="aluminium">Aluminium</option>
    <option value="nickel">Nickel</option>
    <option value="zinc">Zinc</option>
    <option value="lead">Lead</option>
</select>

<input type="number" id="quantity" placeholder="Enter quantity (kg)">
<input type="date" id="deliveryDate">

<button onclick="createOrder()">Create Order</button>

<table>
<thead>
<tr>
    <th>Metal</th>
    <th>Price (£ per kg)</th>
    <th>Quantity (kg)</th>
    <th>Total (£)</th>
    <th>Delivery Date</th>
    <th>Days Left</th>
    <th>Order ID</th>
</tr>
</thead>

<tbody id="output"></tbody>
</table>

<script>

async function createOrder(){

    const metal = document.getElementById("metal").value;
    const quantity = parseFloat(document.getElementById("quantity").value);
    const deliveryDateInput = document.getElementById("deliveryDate").value;

    if(!quantity || quantity <= 0){
        alert("Enter a valid quantity in kg");
        return;
    }

    if(!deliveryDateInput){
        alert("Select a delivery date");
        return;
    }

    try{

        const res = await fetch("https://api.metalpriceapi.com/v1/latest?api_key=636bd01c9b6f77fcfba389cad1148a30&base=USD&currencies=GBP,XAU,XAG,XPT,XPD");
        const data = await res.json();

        const rates = data.rates;

        const usdToGbp = rates.GBP;

        const metalMap = {
            gold: "XAU",
            silver: "XAG",
            platinum: "XPT",
            palladium: "XPD"
        };

        let pricePerKgGBP;

        if(metalMap[metal]){

            // 🔑 FIX: invert rate to get USD per ounce
            const pricePerOunceUSD = 1 / rates[metalMap[metal]];

            // convert ounce → kg (1 kg = 32.1507 troy ounces)
            const pricePerKgUSD = pricePerOunceUSD * 32.1507;

            // convert USD → GBP
            pricePerKgGBP = pricePerKgUSD * usdToGbp;

        } else {

            // fallback prices already roughly per kg (USD)
            const fallbackPricesUSD = {
                copper: 9000,
                aluminium: 2200,
                nickel: 20000,
                zinc: 3000,
                lead: 2500
            };

            pricePerKgGBP = fallbackPricesUSD[metal] * usdToGbp;
        }

        if(!pricePerKgGBP){
            alert("Price not found");
            return;
        }

        const total = (pricePerKgGBP * quantity).toFixed(2);
        const priceDisplay = pricePerKgGBP.toFixed(2);

        const today = new Date();
        const deliveryDate = new Date(deliveryDateInput);

        const daysLeft = Math.ceil((deliveryDate - today) / (1000 * 60 * 60 * 24));

        const orderID = Math.floor(100000 + Math.random() * 900000);

        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td>${metal}</td>
            <td>£${priceDisplay}</td>
            <td>${quantity}</td>
            <td>£${total}</td>
            <td>${deliveryDateInput}</td>
            <td>${daysLeft}</td>
            <td>${orderID}</td>
        `;

        document.getElementById("output").appendChild(tr);

    }
    catch(err){
        console.error(err);
        alert("API failed");
    }
}

</script>

</body>
</html>

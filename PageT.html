<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PageT - Metal API</title>

<style>
body {
    font-family: Arial;
    background:#f4f6f8;
    text-align:center;
}

button {
    padding:10px 15px;
    margin:10px;
    cursor:pointer;
}

table {
    border-collapse: collapse;
    width:60%;
    margin:auto;
    background:white;
}

th {
    background:#333;
    color:white;
    padding:10px;
}

td {
    border:1px solid #ccc;
    padding:10px;
}
</style>
</head>

<body>

<h1>PageT — Live Metal Prices</h1>

<a href="page3.html"><button>Back</button></a>

<br>

<button onclick="loadAPI()">Load Metal Prices</button>

<table id="apiTable">
<thead>
<tr>
<th>Metal</th>
<th>Price (USD)</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

async function loadAPI(){

    const tbody = document.querySelector("#apiTable tbody");
    tbody.innerHTML = "<tr><td colspan='2'>Loading...</td></tr>";

    try{
        const res = await fetch("https://api.metals.live/v1/spot");
        const data = await res.json();

        tbody.innerHTML = "";

        data.forEach(item => {
            const metal = Object.keys(item)[0];
            const price = item[metal];

            const tr = document.createElement("tr");

            tr.innerHTML = `
                <td>${metal}</td>
                <td>${price}</td>
            `;

            tbody.appendChild(tr);
        });

    }
    catch(err){
        tbody.innerHTML = "<tr><td colspan='2'>API Error</td></tr>";
        console.error(err);
    }

}

</script>

</body>
</html>

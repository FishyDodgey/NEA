<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PageT - Metal Orders</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f4f6f8;
}

input, select, button {
    padding: 10px;
    margin: 8px;
    font-size: 14px;
}

table {
    border-collapse: collapse;
    width: 85%;
    margin: 20px auto;
    background: white;
}

th {
    background: #333;
    color: white;
    padding: 10px;
}

td {
    border: 1px solid #ccc;
    padding: 10px;
}
</style>
</head>

<body>

<h1>PageT — Business Metal Orders</h1>

<a href="page3.html"><button>Back to Page 3</button></a>

<br>

<select id="metal">
    <option value="gold">Gold</option>
    <option value="silver">Silver</option>
    <option value="platinum">Platinum</option>
    <option value="palladium">Palladium</option>
    <option value="copper">Copper</option>
    <option value="aluminium">Aluminium</option>
    <option value="nickel">Nickel</option>
    <option value="zinc">Zinc</option>
    <option value="lead">Lead</option>
</select>

<input type="number" id="quantity" placeholder="Enter quantity">
<input type="date" id="deliveryDate">

<button onclick="createOrder()">Create Order</button>

<table>
<thead>
<tr>
    <th>Metal</th>
    <th>Price (£)</th>
    <th>Quantity</th>
    <th>Total (£)</th>
    <th>Delivery Date</th>
    <th>Days Left</th>
    <th>Order ID</th>
</tr>
</thead>

<tbody id="output"></tbody>
</table>

<script>

async function createOrder(){

    const metal = document.getElementById("metal").value;
    const quantity = parseFloat(document.getElementById("quantity").value);
    const deliveryDateInput = document.getElementById("deliveryDate").value;

    if(!quantity || quantity <= 0){
        alert("Enter a valid quantity");
        return;
    }

    if(!deliveryDateInput){
        alert("Select a delivery date");
        return;
    }

    try{

        // API request (now also getting GBP)
        const res = await fetch("https://api.metalpriceapi.com/v1/latest?api_key=636bd01c9b6f77fcfba389cad1148a30&base=USD&currencies=GBP,XAU,XAG,XPT,XPD");
        const apiData = await res.json();

        const rates = apiData.rates;

        // USD → GBP rate
        const usdToGbp = rates.GBP;

        const metalMap = {
            gold: "XAU",
            silver: "XAG",
            platinum: "XPT",
            palladium: "XPD"
        };

        let priceUSD;

        if(metalMap[metal]){
            priceUSD = rates[metalMap[metal]];
        } else {
            const fallbackPrices = {
                copper: 4.5,
                aluminium: 2.2,
                nickel: 8.0,
                zinc: 3.0,
                lead: 2.5
            };
            priceUSD = fallbackPrices[metal];
        }

        if(!priceUSD){
            alert("Price not found");
            return;
        }

        // 💱 Convert to GBP
        const priceGBP = (priceUSD * usdToGbp).toFixed(2);
        const totalGBP = (priceGBP * quantity).toFixed(2);

        const today = new Date();
        const deliveryDate = new Date(deliveryDateInput);

        const timeDiff = deliveryDate - today;
        const daysLeft = Math.ceil(timeDiff / (1000 * 60 * 60 * 24));

        const orderID = Math.floor(100000 + Math.random() * 900000);

        const tbody = document.getElementById("output");

        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td>${metal}</td>
            <td>£${priceGBP}</td>
            <td>${quantity}</td>
            <td>£${totalGBP}</td>
            <td>${deliveryDateInput}</td>
            <td>${daysLeft}</td>
            <td>${orderID}</td>
        `;

        tbody.appendChild(tr);

    }
    catch(err){
        console.error(err);
        alert("API failed");
    }
}

</script>

</body>
</html>

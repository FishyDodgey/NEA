<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Check Metal</title>

<style>
body {
    font-family: Arial, sans-serif;
}

table.inventory {
    border-collapse: collapse;
    width: 90%;
    max-width: 700px;
    margin: 0 auto;
    table-layout: fixed;
}

table.inventory th, table.inventory td {
    border: 1px solid #333;
    padding: 6px;
    text-align: left;
}

table.inventory td[contenteditable="true"] {
    background: #f7f7f7;
}

button {
    margin: 5px;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

<h1 style="text-align:center;">Check Metal</h1>

<div style="text-align:center;">
    <button onclick="addRow()">Add Metal</button>
</div>

<br>

<table id="Metal1Table" class="inventory">
<tr>
    <th>Metal</th>
    <th>New Sheets</th>
    <th>Old Sheets</th>
    <th>Delete</th>
</tr>
</table>

<script>
// ===============================
// CONNECT TO SUPABASE
// ===============================
const supabase = window.supabase.createClient(
    "https://dtlkoxesvryluntpkxst.supabase.co",
    "sb_publishable_oFej7rbKhkstLjb0Po5fHQ_oA7G-3u_"
);

// ===============================
// LOAD DATA (READ)
// ===============================
async function loadTable() {
    const { data, error } = await supabase
        .from("metal")
        .select("*")
        .order("metal");

    if (error) {
        console.error(error);
        alert("Error loading data");
        return;
    }

    const table = document.getElementById("Metal1Table");

    while (table.rows.length > 1) table.deleteRow(1);

    data.forEach(row => {
        const tr = document.createElement("tr");
        tr.dataset.id = row.id;

        tr.innerHTML = `
            <td>${row.metal}</td>
            <td contenteditable="true" onblur="updateRow(this)">${row.new_sheets}</td>
            <td contenteditable="true" onblur="updateRow(this)">${row.old_sheets}</td>
            <td><button onclick="deleteRow('${row.id}')">X</button></td>
        `;

        table.appendChild(tr);
    });
}

// ===============================
// UPDATE (ONLY ONE ROW)
// ===============================
async function updateRow(cell) {
    const row = cell.parentElement;
    const id = row.dataset.id;

    const newSheets = parseInt(row.children[1].textContent);
    const oldSheets = parseInt(row.children[2].textContent);

    if (isNaN(newSheets) || isNaN(oldSheets)) {
        alert("Enter numbers only");
        loadTable();
        return;
    }

    const { error } = await supabase
        .from("metal")
        .update({
            new_sheets: newSheets,
            old_sheets: oldSheets
        })
        .eq("id", id);

    if (error) console.error(error);
}

// ===============================
// CREATE
// ===============================
async function addRow() {
    const metal = prompt("Enter metal name:");
    if (!metal) return;

    const { error } = await supabase
        .from("metal")
        .insert([
            { metal: metal, new_sheets: 0, old_sheets: 0 }
        ]);

    if (error) console.error(error);

    loadTable();
}

// ===============================
// DELETE
// ===============================
async function deleteRow(id) {
    if (!confirm("Delete this metal?")) return;

    await supabase
        .from("metal")
        .delete()
        .eq("id", id);

    loadTable();
}

// ===============================
// INITIAL LOAD
// ===============================
loadTable();

</script>

</body>
</html>
